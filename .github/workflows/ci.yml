name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  # Merge-queue entries run on a temporary `gh-readonly-queue/*` branch and emit
  # a `merge_group` event, not `pull_request`/`push`. Without this the required
  # `verify` check never runs on the queue branch and every queued PR stalls.
  # Keep in lockstep with the "Require merge queue" branch protection on `main`.
  merge_group:

permissions:
  contents: read

jobs:
  # Matrixed over ubuntu-latest + windows-latest (issue #11 — Windows support).
  # A matrix reports per-OS check names ("build (ubuntu-latest)",
  # "build (windows-latest)"), which are unstable required-check targets — the
  # names change whenever the OS list does. So this job is named `build`, and a
  # single `verify` gate job below fans them in. Branch protection requires the
  # stable `verify` name and never needs editing when the matrix changes.
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # The one unrecoverable gate: the repo is public, so a private string in a
      # tracked file is the failure mode that's expensive to walk back. Runs
      # FIRST so a leak fails fast, before lint/tests. Pure stdlib, no deps.
      # `python` (not `python3`) is what setup-python guarantees on every OS;
      # on the Windows runner `python3` may resolve to the Microsoft Store
      # app-execution alias (or be absent), which would fail this required job.
      - name: Leak gate
        run: python scripts/check-leaks.py

      - name: Install ruff
        run: pip install ruff

      # Lint is advisory for now: the engine predates this CI, so a hard style
      # gate would block on pre-existing findings. `continue-on-error` surfaces
      # them without failing the build; flip to a hard gate once the baseline is
      # clean (mirrors offlinecv's report-only fallow step).
      - name: Ruff lint (advisory)
        continue-on-error: true
        run: ruff check .

      - name: Ruff format check (advisory)
        continue-on-error: true
        run: ruff format --check .

      # pytest only if a suite exists — no tests today, so this no-ops cleanly
      # instead of failing on "no tests collected".
      - name: Tests
        shell: bash
        run: |
          if [ -d tests ] || git ls-files '*_test.py' 'test_*.py' | grep -q .; then
            pip install pytest
            pytest -q
          else
            echo "No test suite found — skipping (tracked as a follow-up)."
          fi

  # Stable required-check gate. Branch protection on `main` requires `verify`;
  # this job just fans in every matrix leg, so the required-check name stays
  # constant no matter how the `build` matrix (OS list) changes. `needs`
  # succeeds only if all `build` legs pass, so `verify` is green iff the whole
  # matrix is green.
  verify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: All build legs passed
        run: echo "verify — all build matrix legs green."
